<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <h1>🔐 Gerador de Senhas</h1>

        <p>
            Gere senhas com 6 caracteres contendo
            pelo menos 3 números e 2 letras maiúsculas.
        </p>

        <div class="senha">
            <div class="caixa" id="b1">-</div>
            <div class="caixa" id="b2">-</div>
            <div class="caixa" id="b3">-</div>
            <div class="caixa" id="b4">-</div>
            <div class="caixa" id="b5">-</div>
            <div class="caixa" id="b6">-</div>
        </div>

        <button onclick="gerarSenha()">
            Gerar Senha
        </button>

    </div>

<script>
function gerarSenha(){

    const numeros = "0123456789";
    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    let senha = [];

    for(let i=0;i<3;i++){
        senha.push(
            numeros[Math.floor(Math.random()*numeros.length)]
        );
    }

    for(let i=0;i<2;i++){
        senha.push(
            letras[Math.floor(Math.random()*letras.length)]
        );
    }

    const todos = numeros + letras;

    senha.push(
        todos[Math.floor(Math.random()*todos.length)]
    );

    senha.sort(() => Math.random() - 0.5);

    for(let i=0;i<6;i++){
        document.getElementById("b"+(i+1)).textContent = senha[i];
    }
}
</script>

</body>
</html>
